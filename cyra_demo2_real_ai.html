<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:#040c14;color:#e2f0eb;font-size:13px;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#061018}::-webkit-scrollbar-thumb{background:rgba(0,210,120,.4);border-radius:2px}
.dot{width:5px;height:5px;border-radius:50%;background:#00d278;animation:pu 1.5s infinite;display:inline-block}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.2}}
.screen{display:none}
.screen.on{display:flex;flex-direction:column;min-height:100vh}

/* LOGIN */
#sl{background:linear-gradient(135deg,#010608,#030e18);align-items:center;justify-content:center;padding:20px}
.lcard{background:rgba(6,16,24,.95);border:1px solid rgba(0,210,120,.2);border-radius:14px;padding:36px 32px;width:100%;max-width:400px}
.logo{font-family:monospace;font-size:44px;font-weight:700;letter-spacing:10px;background:linear-gradient(135deg,#00d278,#00f090,#00b4f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;text-align:center}
.lsub{font-size:9px;letter-spacing:3px;color:#5a9080;display:block;text-align:center;margin-top:4px;text-transform:uppercase}
.lline{width:44px;height:1px;margin:12px auto 20px;background:linear-gradient(90deg,transparent,#00d278,transparent)}
.lcred{background:rgba(0,210,120,.08);border:1px solid rgba(0,210,120,.3);border-radius:6px;padding:8px 12px;margin-bottom:18px;font-size:10px;color:#00d278;font-family:monospace}
input{width:100%;background:rgba(3,9,18,.8);border:1px solid rgba(0,210,120,.15);border-radius:6px;color:#e2f0eb;padding:10px 12px;font-size:13px;margin-bottom:10px;outline:none}
input:focus{border-color:#00d278}
.lbtn{width:100%;background:linear-gradient(135deg,#00d278,#009855);color:#020e07;font-size:13px;font-weight:700;padding:12px;border-radius:6px;border:none;cursor:pointer;margin-bottom:8px;letter-spacing:1px}
.lbtn:hover{opacity:.9}
.ldbtn{width:100%;background:transparent;border:1px solid rgba(0,180,240,.25);color:#00b4f0;font-size:10px;padding:8px;border-radius:6px;cursor:pointer;letter-spacing:1px}
.ldbtn:hover{background:rgba(0,180,240,.08)}

/* APP */
#sa{background:#040c14}
.ah{height:50px;background:rgba(6,16,24,.97);border-bottom:1px solid rgba(0,210,120,.13);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.alogo{font-family:monospace;font-size:17px;font-weight:700;letter-spacing:4px;color:#00d278}
.hdiv{width:1px;height:20px;background:rgba(0,210,120,.15)}
.cbadge{display:flex;align-items:center;gap:5px;background:rgba(15,32,48,1);border:1px solid rgba(0,210,120,.15);border-radius:6px;padding:2px 9px}
.ccode{font-family:monospace;font-size:11px;font-weight:700;color:#e2f0eb;letter-spacing:1px}
.ctype{font-size:8px;font-family:monospace;padding:1px 5px;background:rgba(0,210,120,.1);border-radius:3px;color:#00d278}
.ibadge{display:flex;align-items:center;gap:4px;background:rgba(0,180,240,.08);border:1px solid rgba(0,180,240,.2);border-radius:20px;padding:2px 8px;font-size:8px;color:#00b4f0;font-weight:700;letter-spacing:.5px;font-family:monospace}
.hr{margin-left:auto;display:flex;align-items:center;gap:7px}
.aip{display:flex;align-items:center;gap:4px;font-size:8px;color:#00d278;background:rgba(0,210,120,.08);border:1px solid rgba(0,210,120,.25);padding:2px 8px;border-radius:4px;font-family:monospace;letter-spacing:.5px}
.bnew{background:rgba(0,210,120,.08);border:1px solid rgba(0,210,120,.3);color:#00d278;font-size:9px;padding:5px 10px;border-radius:5px;cursor:pointer;font-weight:700;letter-spacing:.5px}
.bnew:hover{background:rgba(0,210,120,.15)}
.blg{background:none;border:1px solid rgba(0,210,120,.15);color:#5a9080;width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.blg:hover{border-color:rgba(240,64,64,.5);color:#f04040}
.abody{display:flex;flex:1;min-height:calc(100vh - 50px)}

/* SIDEBAR */
.side{width:190px;min-width:190px;background:rgba(6,16,24,.98);border-right:1px solid rgba(0,210,120,.13);display:flex;flex-direction:column}
.spt{padding:10px 12px 8px;border-bottom:1px solid rgba(0,210,120,.1)}
.spid{font-family:monospace;font-size:8px;color:#5a9080;letter-spacing:1px;text-transform:uppercase}
.spval{font-family:monospace;font-size:10px;color:#00d278;font-weight:700;margin-top:1px}
.spb{margin-top:6px}
.spbl{font-size:8px;color:#5a9080;display:flex;justify-content:space-between;margin-bottom:3px}
.spbar{height:3px;background:#040c14;border-radius:2px;overflow:hidden}
.spfill{height:100%;background:linear-gradient(90deg,#00d278,#00b4f0);border-radius:2px;transition:width .5s}
.zl{flex:1;padding:5px 0}
.zi{display:flex;align-items:center;gap:7px;padding:8px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .2s}
.zi:hover{background:rgba(0,210,120,.06)}
.zi.on{background:rgba(0,210,120,.07);border-left-color:#00d278}
.zi.dn{border-left-color:#00d278}
.zic{width:26px;height:26px;border-radius:5px;background:rgba(15,32,48,1);border:1px solid rgba(0,210,120,.13);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.zi.on .zic{border-color:#00d278;background:rgba(0,210,120,.1)}
.zn{font-size:9px;font-weight:600;color:#e2f0eb;font-family:monospace;letter-spacing:.3px}
.zm{margin-top:2px;font-size:7px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:1px 4px;border-radius:6px;display:inline-block}
.zmpend{background:rgba(30,72,56,.3);color:#1e4838;border:1px solid rgba(30,72,56,.4)}
.zmact{background:rgba(0,180,240,.1);color:#00b4f0;border:1px solid rgba(0,180,240,.25)}
.zmdn{background:rgba(0,210,120,.08);color:#00d278;border:1px solid rgba(0,210,120,.2)}
.sft{padding:10px 12px;border-top:1px solid rgba(0,210,120,.1)}
.sfr{display:flex;justify-content:space-between;font-size:8px;color:#1e4838;margin-bottom:2px}
.snew{padding:10px 12px;border-top:1px solid rgba(0,210,120,.1)}

/* MAIN */
.main{flex:1;overflow-y:auto;background:#040c14;display:flex;flex-direction:column}
.fwrap{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.fhdr{background:rgba(11,24,36,1);border:1px solid rgba(0,210,120,.13);border-radius:10px;padding:13px 16px;display:flex;align-items:center;gap:12px}
.ftitle{font-family:monospace;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.fsub{font-size:8px;color:#5a9080;margin-top:2px;font-family:monospace}
.fchip{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:8px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:4px;border:1px solid}
.fpend{color:#5a9080;border-color:rgba(0,210,120,.13)}
.frdy{color:#00d278;border-color:rgba(0,210,120,.28);background:rgba(0,210,120,.06);animation:gp 2s infinite}
@keyframes gp{0%,100%{box-shadow:0 0 0 0 rgba(0,210,120,.15)}50%{box-shadow:0 0 0 3px rgba(0,210,120,0)}}

/* UPLOAD SLOT */
.uslot{background:rgba(11,24,36,1);border:1px solid rgba(0,210,120,.13);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:9px;transition:border-color .2s}
.uslot.loaded{border-color:rgba(0,210,120,.3)}
.uslot.analyzed{border-color:rgba(0,210,120,.4)}
.ulbl{font-family:monospace;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#5a9080;display:flex;align-items:center;gap:6px}
.udz{border:2px dashed rgba(0,210,120,.2);border-radius:6px;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;background:rgba(0,210,120,.01)}
.udz:hover{border-color:rgba(0,210,120,.5);background:rgba(0,210,120,.06)}
.udz.hi{min-height:0;border-style:solid;border-color:rgba(0,210,120,.3)}
.udz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2}
.uic{font-size:28px;color:#1e4838}
.utit{font-family:monospace;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#5a9080}
.uhint{font-size:9px;color:#1e4838}
.uimg{width:100%;max-height:320px;object-fit:contain;display:block;border-radius:5px;position:relative;z-index:0}
.urmv{position:absolute;top:7px;right:7px;background:rgba(240,64,64,.85);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;z-index:5}

/* BOUNDING BOX OVERLAY */
.bbox-container{position:relative;display:inline-block;width:100%}
.bbox{position:absolute;border:2px solid;border-radius:3px;cursor:pointer;transition:opacity .2s}
.bbox:hover{opacity:.8}
.bbox-lbl{position:absolute;top:-19px;left:0;font-family:monospace;font-size:8px;font-weight:700;letter-spacing:.5px;padding:2px 5px;border-radius:2px;white-space:nowrap;background:rgba(4,12,20,.9);border:1px solid currentColor}
.bbox-idx{position:absolute;bottom:-15px;right:0;font-family:monospace;font-size:7px;padding:1px 4px;border-radius:2px;background:rgba(4,12,20,.9);border:1px solid currentColor}
.corner{position:absolute;width:7px;height:7px}
.corner.tl{top:-1px;left:-1px;border-top:2px solid currentColor;border-left:2px solid currentColor}
.corner.tr{top:-1px;right:-1px;border-top:2px solid currentColor;border-right:2px solid currentColor}
.corner.bl{bottom:-1px;left:-1px;border-bottom:2px solid currentColor;border-left:2px solid currentColor}
.corner.br{bottom:-1px;right:-1px;border-bottom:2px solid currentColor;border-right:2px solid currentColor}
.scan-beam{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00d278,transparent);animation:scanb 2.2s linear infinite;pointer-events:none;z-index:3}
@keyframes scanb{from{top:0}to{top:100%}}
.grid-overlay{position:absolute;inset:0;pointer-events:none;opacity:.06;background-image:linear-gradient(rgba(0,210,120,1) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,120,1) 1px,transparent 1px);background-size:10% 25%}
.iicl-lbl{position:absolute;top:7px;left:7px;background:rgba(4,12,20,.88);border:1px solid rgba(0,210,120,.3);padding:2px 7px;border-radius:3px;font-family:monospace;font-size:7px;color:#00d278;letter-spacing:.5px;z-index:4}

/* AI BAR */
.aibar{background:rgba(11,24,36,1);border:1px solid rgba(0,210,120,.13);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.aieng{display:flex;align-items:center;gap:7px;background:rgba(0,210,120,.06);border:1px solid rgba(0,210,120,.18);border-radius:5px;padding:5px 10px;flex-shrink:0}
.aieng-t{font-family:monospace;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#00d278}
.aieng-s{font-size:7px;color:#5a9080;margin-top:1px;font-family:monospace}
.aiinfo{flex:1;font-size:9px;color:#5a9080;font-family:monospace}
.pbtnw{display:flex;justify-content:center;padding:2px}
.pbtn{background:linear-gradient(135deg,#00d278,#00b4f0);color:#020e07;font-family:monospace;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:14px 36px;border-radius:6px;border:none;cursor:pointer;box-shadow:0 6px 24px rgba(0,210,120,.3)}
.pbtn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,210,120,.4)}
.pbtn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

/* PROCESSING */
.procv{background:rgba(11,24,36,1);border:1px solid rgba(0,210,120,.3);border-radius:10px;padding:28px;text-align:center}
.pring{width:72px;height:72px;border-radius:50%;border:1px solid rgba(0,210,120,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;animation:rot 4s linear infinite}
.pring-i{width:58px;height:58px;border-radius:50%;border:2px solid transparent;border-top-color:#00d278;border-right-color:#00b4f0;animation:spin 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
.plbl{font-family:monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#00d278}
.psub{font-size:9px;color:#5a9080;font-family:monospace;margin-top:3px}
.pbar{height:3px;background:#040c14;border-radius:2px;overflow:hidden;margin:12px auto 0;width:260px}
.pfill{height:100%;background:linear-gradient(90deg,#00d278,#00b4f0);border-radius:2px;width:0%;transition:width .4s}
.psteps{margin-top:14px;display:flex;flex-direction:column;gap:4px;text-align:left;max-width:300px;margin-left:auto;margin-right:auto}
.ps{display:flex;align-items:center;gap:8px;padding:5px 10px;background:rgba(15,32,48,1);border-radius:5px;font-size:9px;font-family:monospace}
.ps.done{color:#00d278}.ps.act{color:#00b4f0}.ps.pend{color:#1e4838}
.psd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ps.done .psd{background:#00d278}.ps.act .psd{background:#00b4f0;animation:pu .7s infinite}.ps.pend .psd{background:#1e4838}

/* ERROR */
.errv{background:rgba(240,64,64,.06);border:1px solid rgba(240,64,64,.3);border-radius:10px;padding:28px;text-align:center}
.errtit{font-family:monospace;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#f04040;margin:12px 0 8px}
.errsub{font-size:11px;color:#5a9080;margin-bottom:8px}
.errcode{font-family:monospace;font-size:9px;color:#1e4838;background:rgba(0,0,0,.3);border-radius:5px;padding:6px 12px;display:inline-block;margin-bottom:16px;max-width:400px;word-break:break-word}
.errbtn{background:linear-gradient(135deg,#00d278,#009855);color:#020e07;font-family:monospace;font-size:12px;font-weight:700;padding:11px 24px;border-radius:6px;border:none;cursor:pointer;letter-spacing:1px}

/* INVALID */
.invv{background:rgba(240,168,0,.06);border:1px solid rgba(240,168,0,.3);border-radius:7px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.invtit{font-family:monospace;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#f0a800;margin-bottom:3px}
.invsub{font-size:10px;color:#5a9080}

/* FINDINGS */
.fc2{background:rgba(11,24,36,1);border:1px solid rgba(0,210,120,.13);border-radius:7px;padding:9px 11px;display:flex;align-items:flex-start;gap:9px;cursor:pointer;transition:all .2s;margin-bottom:6px}
.fc2:hover{border-color:rgba(0,210,120,.35);transform:translateX(2px)}
.fc2num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:9px;font-weight:700;flex-shrink:0;border:1px solid;margin-top:1px}
.fc2code{font-family:monospace;font-size:11px;font-weight:700;color:#f0a800}
.fc2loc{font-family:monospace;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(0,210,120,.08);border:1px solid rgba(0,210,120,.2);color:#00d278;letter-spacing:1px}
.fc2desc{font-size:10px;color:#e2f0eb;margin-top:2px}
.fc2sub{font-size:8px;color:#5a9080;font-family:monospace;margin-top:2px}
.sb{display:inline-flex;align-items:center;padding:1px 6px;border-radius:20px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border:1px solid;font-family:monospace}
.sl{background:rgba(0,210,120,.1);color:#00d278;border-color:rgba(0,210,120,.25)}
.sm{background:rgba(0,180,240,.1);color:#00b4f0;border-color:rgba(0,180,240,.25)}
.sh{background:rgba(240,168,0,.1);color:#f0a800;border-color:rgba(240,168,0,.25)}
.sc{background:rgba(240,64,64,.1);color:#f04040;border-color:rgba(240,64,64,.25)}

/* RESULTS */
.rcard{background:rgba(11,24,36,1);border:1px solid rgba(0,210,120,.13);border-radius:10px;padding:13px 14px;margin-bottom:10px}
.rtit{font-family:monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#00d278;margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sc2{background:rgba(11,24,36,1);border:1px solid rgba(0,210,120,.13);border-radius:6px;padding:10px;text-align:center}
.scv{font-family:monospace;font-size:20px;font-weight:700;line-height:1;margin-bottom:2px}
.scl{font-size:8px;color:#5a9080;text-transform:uppercase;letter-spacing:1px}

/* RESULTS IMAGE+FINDINGS SPLIT */
.rpanel{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rpanel-img{background:rgba(11,24,36,1);border:1px solid rgba(0,210,120,.13);border-radius:10px;padding:11px}
.rpanel-list{overflow-y:auto;max-height:420px}

/* EIR */
.eirwrap{padding:14px 16px}
.eirdoc{background:rgba(8,18,28,1);border:1px solid rgba(0,210,120,.35);border-radius:10px;overflow:hidden}
.eirhdr{background:linear-gradient(135deg,rgba(0,210,120,.06),rgba(0,180,240,.04));border-bottom:1px solid rgba(0,210,120,.13);padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.eirlogo{font-family:monospace;font-size:22px;font-weight:700;letter-spacing:5px;color:#00d278}
.eirls{font-family:monospace;font-size:7px;letter-spacing:2px;color:#5a9080;margin-top:2px;text-transform:uppercase}
.eirtit{font-family:monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:#e2f0eb;text-transform:uppercase;text-align:right}
.eirid{font-family:monospace;font-size:9px;color:#00d278;margin-top:3px;text-align:right}
.eirdate{font-family:monospace;font-size:8px;color:#5a9080;margin-top:2px;text-align:right}
.eirinfo{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid rgba(0,210,120,.1)}
.eiric{padding:10px 16px;border-right:1px solid rgba(0,210,120,.1)}
.eiric:last-child{border-right:none}
.eiril{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#1e4838;margin-bottom:2px}
.eiriv{font-family:monospace;font-size:10px;color:#e2f0eb;font-weight:700}
.eirsum{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid rgba(0,210,120,.1)}
.eirsc{padding:12px 14px;border-right:1px solid rgba(0,210,120,.1);text-align:center}
.eirsc:last-child{border-right:none}
.eirsv{font-family:monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:2px}
.eirsl{font-size:7px;color:#5a9080;text-transform:uppercase;letter-spacing:1px}
.eirbody{padding:14px 16px}
.eirst{font-family:monospace;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#00d278;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.eirst::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,210,120,.3),transparent)}
.eirtbl{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:9px}
.eirtbl th{text-align:left;font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#1e4838;padding:4px 8px;border-bottom:1px solid rgba(0,210,120,.1);font-family:monospace}
.eirtbl td{padding:6px 8px;border-bottom:1px solid rgba(0,0,0,.2);vertical-align:top}
.eirtbl tr:last-child td{border-bottom:none}
.eirtbl tr:hover td{background:rgba(0,210,120,.025)}
.eirimg{width:50px;height:36px;object-fit:cover;border-radius:3px;border:1px solid rgba(0,210,120,.13);cursor:pointer}
.eirft{background:rgba(15,32,48,1);border-top:1px solid rgba(0,210,120,.1);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.eirftt{font-size:7px;color:#1e4838;font-family:monospace}
.eirftb{font-family:monospace;font-size:7px;letter-spacing:1px;color:#00d278;background:rgba(0,210,120,.08);border:1px solid rgba(0,210,120,.2);padding:2px 7px;border-radius:3px}
.eiract{display:flex;gap:8px;margin-bottom:12px;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:5px;font-family:monospace;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border:none;transition:all .2s}
.bp{background:linear-gradient(135deg,#00d278,#009855);color:#020e07;box-shadow:0 3px 10px rgba(0,210,120,.25)}

<script>
const FACES=[
  {id:'right', name:'Lateral Derecho Ext.', icon:'▶', c1:'R'},
  {id:'front', name:'Frontal Externo',       icon:'▲', c1:'F'},
  {id:'left',  name:'Lateral Izq. Ext.',    icon:'◀', c1:'L'},
  {id:'roof',  name:'Techo Externo',         icon:'■', c1:'T'},
];
const EXTRA=[
  {id:'ai',   name:'Estado IA',   icon:'🤖'},
  {id:'res',  name:'Resultados',  icon:'📊'},
  {id:'eir',  name:'EIR Final',   icon:'📄'},
];
const SL={low:'Baja',medium:'Media',high:'Alta',critical:'Crítica'};
const SC={low:'sl',medium:'sm',high:'sh',critical:'sc'};
const SCLR={low:'rgba(0,210,120,.85)',medium:'rgba(0,180,240,.85)',high:'rgba(240,168,0,.9)',critical:'rgba(240,64,64,.9)'};

const ST={
  inspId:null,images:{},findings:[],faceFindings:{},
  processed:false,processing:false,score:null,
  cur:'right',invalidFaces:{},
};

function key(fid){return fid+'_0';}
function allLoaded(){return FACES.every(f=>ST.images[key(f.id)]);}
function loadedCount(){return FACES.filter(f=>ST.images[key(f.id)]).length;}
function genId(){return 'CYRA-EXT-'+Math.floor(100000+Math.random()*899999);}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function genCyraCode(fid,bx,by,bw,bh){
  const face=FACES.find(f=>f.id===fid);
  const c1=face?face.c1:'?';
  let c2;
  if(fid==='roof') c2=bx<0.5?'L':'R';
  else if(by<0.13) c2='H';
  else if(by<0.50) c2='T';
  else if(by<0.88) c2='B';
  else c2='G';
  const col=Math.min(10,Math.max(1,Math.ceil((bx||0.5)*10)));
  const c3=col===10?'0':String(col);
  const span=Math.round((bw||0.1)*10);
  let c4='N';
  if(span>1){const end=Math.min(10,col+span-1);c4=end===10?'0':String(end);}
  return c1+c2+c3+c4;
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('on');s.style.setProperty('display','none','important');});
  const t=document.getElementById(id);
  if(t){t.classList.add('on');t.style.setProperty('display','flex','important');}
}
function toast(msg,t='s'){
  const existing=document.getElementById('toast-el');
  if(existing) existing.remove();
  const el=document.createElement('div');
  el.id='toast-el';
  const colors={s:'#00d278',w:'#f0a800',e:'#f04040',g:'#00d278'};
  el.style.cssText=`position:fixed;top:14px;right:14px;z-index:9999;background:rgba(6,16,24,.97);border:1px solid ${colors[t]||colors.s};border-left:3px solid ${colors[t]||colors.s};border-radius:6px;padding:9px 13px;font-size:11px;color:#e2f0eb;font-family:monospace;max-width:280px;pointer-events:none;animation:tI .25s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)`;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},3200);
}

function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();
  if(!u||!p){toast('Complete los campos','w');return;}
  initApp();show('sa');toast('✓ Sesión iniciada · CYRA External Portal','g');
}
function doLogout(){
  if(confirm('¿Cerrar sesión?')){show('sl');}
}
function initApp(){
  ST.inspId=genId();ST.images={};ST.findings=[];ST.faceFindings={};
  ST.processed=false;ST.processing=false;ST.score=null;
  ST.cur='right';ST.invalidFaces={};
  document.getElementById('spid').textContent=ST.inspId;
  renderSide();renderView('right');
}
function newReq(){
  if(confirm('¿Iniciar nueva solicitud? Se limpiará la sesión actual.')){initApp();toast('⊕ Nueva solicitud · '+ST.inspId,'s');}
}

function renderSide(){
  const el=document.getElementById('zl');el.innerHTML='';
  FACES.forEach(f=>{
    const loaded=ST.images[key(f.id)];
    const analyzed=ST.faceFindings[f.id]!==undefined;
    const inv=ST.invalidFaces[f.id];
    let pc='zmpend',pl='Pendiente';
    if(f.id===ST.cur){pc='zmact';pl='Activo';}
    else if(analyzed){pc='zmdn';pl='Analizado';}
    else if(inv){pc='zmdn';pl='No válida';}
    else if(loaded){pc='zmdn';pl='Listo';}
    const d=document.createElement('div');
    d.className='zi'+(ST.cur===f.id?' on':'')+(loaded?' dn':'');
    d.onclick=()=>renderView(f.id);
    d.innerHTML=`<div class="zic">${f.icon}</div><div><div class="zn">${f.name}</div><span class="zm ${pc}">${pl}</span>${loaded?`<div style="font-size:7px;color:#1e4838;font-family:monospace;margin-top:1px">1/1 img</div>`:''}</div>`;
    el.appendChild(d);
  });
  // divider
  const dv=document.createElement('div');dv.style.cssText='height:1px;background:rgba(0,210,120,.1);margin:5px 12px';
  el.appendChild(dv);
  EXTRA.forEach(v=>{
    const d=document.createElement('div');
    d.className='zi'+(ST.cur===v.id?' on':'');
    d.onclick=()=>renderView(v.id);
    d.innerHTML=`<div class="zic">${v.icon}</div><div class="zn">${v.name}</div>`;
    el.appendChild(d);
  });
  const loaded=loadedCount(),total=FACES.length;
  const pct=Math.round(((loaded/total)*.5+(Object.keys(ST.faceFindings).length/total)*.5)*100);
  document.getElementById('sppct').textContent=pct+'%';
  document.getElementById('spbar').style.width=pct+'%';
}

function renderView(vid){
  ST.cur=vid;renderSide();

function loadImg(e,faceId){
  const f=e.target.files[0];
  if(!f) return;
  if(!f.type.startsWith('image/')){toast('Solo imágenes JPG/PNG/WEBP','e');return;}
  const r=new FileReader();
  r.onload=ev=>{
    ST.images[key(faceId)]={data:ev.target.result,name:f.name,type:f.type};
    renderView(ST.cur);renderSide();
    toast('📷 Imagen cargada · '+FACES.find(x=>x.id===faceId).name,'g');
  };
  r.readAsDataURL(f);
}
function removeImg(faceId){
  delete ST.images[key(faceId)];

async function animStep(i,pct){
  if(i>0){const prev=document.getElementById('ps'+(i-1));if(prev)prev.className='ps done';}
  const el=document.getElementById('ps'+i);if(el)el.className='ps act';
  const pb=document.getElementById('pfill');if(pb)pb.style.width=pct+'%';
  await sleep(400+Math.random()*300);
}

async function processAllFaces(){
  ST.findings=[];ST.faceFindings={};
  await animStep(0,10);await animStep(1,18);
  for(let i=0;i<FACES.length;i++){
    const face=FACES[i];
    await animStep(i+2,18+(i+1)*14);
    const img=ST.images[key(face.id)];
    if(!img) continue;
    const res=await callCyraEvaluator(face,img);
    if(res.invalid){
      ST.invalidFaces[face.id]={invalid:true,reason:res.reason};
      ST.faceFindings[face.id]=[];
    } else {
      ST.faceFindings[face.id]=res.map((f,j)=>({...f,_idx:ST.findings.length+j,face:face.id,faceName:face.name,photo:img.data}));
      ST.findings.push(...ST.faceFindings[face.id]);
    }
  }
  await animStep(6,92);await sleep(300);
  await animStep(7,100);
  const last=document.getElementById('ps7');if(last)last.className='ps done';
  const w={low:1,medium:2,high:3,critical:4};
  const max=ST.findings.length*4||1;
  ST.score=Math.max(0,Math.round((1-ST.findings.reduce((s,f)=>s+(w[f.severity]||1),0)/max)*100));
}

async function callCyraEvaluator(face,img){
  const payload = {
    inspection_id: ST.inspId,
    container_id: document.getElementById('hcode')?.textContent || 'PENDIENTE',
    container_type: '40HC',
    operation: 'Gate In',
    depot: 'DXP - Paita, Perú',
    face_id: face.id,
    face_name: face.name,
    image_type: img.type || 'image/jpeg',
    image_base64: img.data.split(',')[1]
  };

  const response = await fetch('/api/evaluar-contenedor', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });

  if(!response.ok){
    let detail = '';
    try {
      const err = await response.json();
      detail = err.detail || err.error || JSON.stringify(err);
    } catch(e) {
      detail = await response.text();
    }
    throw new Error(`CYRA AI Evaluator ${response.status}: ${detail}`);
  }

  const data = await response.json();

  if(data.invalid){
    return {invalid:true, reason:data.reason || 'La imagen no corresponde a una superficie externa de contenedor.'};
  }

  const parsed = Array.isArray(data) ? data : (Array.isArray(data.findings) ? data.findings : []);
  const valid=['BR','BT','BW','CO','CT','CU','DB','DL','DT','DY','FZ','GD','HO','IR','LK','LO','ML','MS','NI','NL','OL','OR','OS','WN','WT','BN','CK','PH','OF'];
  const severities=['low','medium','high','critical'];
  const repairs=['Soldadura','Parche estructural','Reemplazo de panel','Enderezado','Tratamiento anticorrosivo','Pintura/retoque','Limpieza','No requiere reparación'];

  return parsed.map(f=>{
    if(!valid.includes(f.damage_code)) f.damage_code='WT';
    if(!severities.includes(f.severity)) f.severity='medium';
    if(!repairs.includes(f.repair_method)) f.repair_method='No requiere reparación';
    if(!f.cyra_location && f.bbox_x!==undefined) {
      f.cyra_location=genCyraCode(face.id,f.bbox_x,f.bbox_y,f.bbox_w,f.bbox_h);
    }
    if(typeof f.confidence !== 'number') f.confidence=.85;
    return f;
  });
}

function loadHtml2Pdf(callback) {

  script.onload = callback;
  script.onerror = function() {
    alert("No se pudo cargar el generador PDF. Verifica tu conexión a internet.");

}

function exportEIRPDF() {
  const eir = document.getElementById("eirdoc");

      margin: 8,

/* === CYRA MANUAL CONTAINER + CLEAN BRAND PATCH === */
(function () {
  const STORAGE_KEY = "cyra_container_code_manual";

  function cleanText(value) {
    if (!value) return value;

    return String(value)
      .replace(/CYRA AI Evaluator\s*\(CYRA AI\)\s*·\s*Inspector IICL/gi, "CYRA AI · Inspector IICL")
      .replace(/CYRA AI Evaluator\s*\(Anthropic\)\s*·\s*Inspector IICL/gi, "CYRA AI · Inspector IICL")
      .replace(/CYRA AI Evaluator\s*\(Anthropic\)/gi, "CYRA AI")
      .replace(/Anthropic/gi, "CYRA AI")
      .replace(/Claude/gi, "CYRA AI")
      .replace(/Análisis real de imagen\s*·\s*Sin simulación/gi, "Análisis de imagen")
      .replace(/Análisis real de imagen/gi, "Análisis de imagen")
      .replace(/Sin simulación/gi, "")
      .replace(/IA REAL/gi, "CYRA AI")
      .replace(/IA real/gi, "CYRA AI")
      .replace(/Real AI/gi, "CYRA AI")
      .replace(/simulación/gi, "operación")
      .replace(/simulado/gi, "operativo")
      .replace(/simulada/gi, "operativa")
      .replace(/EIR GENERADO POR CYRA AI REAL/gi, "EIR GENERADO POR CYRA AI")
      .replace(/EIR GENERADO POR IA REAL/gi, "EIR GENERADO POR CYRA AI");
  }

  function cleanVisibleText() {
    if (!document.body) return;

    const walker = document.createTreeWalker(
      document.body,
      NodeFilter.SHOW_TEXT,
      {
        acceptNode(node) {
          const p = node.parentElement;
          if (!p) return NodeFilter.FILTER_REJECT;
          const tag = p.tagName ? p.tagName.toLowerCase() : "";
          if (["script", "style", "textarea", "input"].includes(tag)) {
            return NodeFilter.FILTER_REJECT;
          }
          return NodeFilter.FILTER_ACCEPT;
        }
      }
    );

    const nodes = [];
    let node;

    while ((node = walker.nextNode())) {
      nodes.push(node);
    }

    nodes.forEach(n => {
      const cleaned = cleanText(n.nodeValue);
      if (cleaned !== n.nodeValue) {
        n.nodeValue = cleaned;
      }
    });
  }

  function normalizeContainerCode(code) {
    if (!code) return "";
    return String(code)
      .toUpperCase()
      .replace(/[^A-Z0-9]/g, "")
      .trim();
  }

  function isContainerCode(code) {
    return /^[A-Z]{4}\d{7}$/.test(normalizeContainerCode(code));
  }

  function getCurrentContainerCode() {
    const stored = normalizeContainerCode(localStorage.getItem(STORAGE_KEY) || "");
    if (stored) return stored;

    if (window.ST) {
      const possible = normalizeContainerCode(
        ST.containerId || ST.container || ST.cid || ST.container_id_detected || ""
      );
      if (possible) return possible;
    }

    return "";
  }

  function setContainerCode(code, manual = false) {
    const clean = normalizeContainerCode(code);
    if (!clean) return;

    localStorage.setItem(STORAGE_KEY, clean);

    if (window.ST) {
      ST.containerId = clean;
      ST.container = clean;
      ST.cid = clean;
      ST.container_id_detected = clean;
    }

    updateContainerText(clean);

    const input = document.getElementById("cyraContainerManualInput");
    if (input && input.value !== clean) {
      input.value = clean;
    }
  }

  function updateContainerText(code) {
    if (!code) return;

    const walker = document.createTreeWalker(
      document.body,
      NodeFilter.SHOW_TEXT,
      {
        acceptNode(node) {
          const txt = node.nodeValue ? node.nodeValue.trim() : "";
          if (!txt) return NodeFilter.FILTER_REJECT;

          if (
            txt === "PENDIENTE" ||
            txt === "CONTENEDOR_VISIBLE" ||
            txt === "MSKU1234567" ||
            txt === "CICU9876547" ||
            /^[A-Z]{4}\d{7}$/.test(txt)
          ) {
            return NodeFilter.FILTER_ACCEPT;
          }

          return NodeFilter.FILTER_REJECT;
        }
      }
    );

    const nodes = [];
    let node;

    while ((node = walker.nextNode())) {
      nodes.push(node);
    }

    nodes.forEach(n => {
      const p = n.parentElement;
      if (!p) return;

      const nearby = (p.parentElement ? p.parentElement.innerText : p.innerText || "").toUpperCase();

      if (
        n.nodeValue.trim() === "PENDIENTE" ||
        n.nodeValue.trim() === "CONTENEDOR_VISIBLE" ||
        nearby.includes("CONTENEDOR") ||
        nearby.includes("CONTAINER") ||
        nearby.includes("EIR") ||
        nearby.includes("INSPECCIÓN") ||
        nearby.includes("INSPECCION")
      ) {
        n.nodeValue = code;
      }
    });
  }

  function findContainerCodeInObject(obj) {
    if (!obj || typeof obj !== "object") return "";

    const directKeys = [
      "container_id_detected",
      "container_id",
      "container",
      "container_code",
      "id_contenedor",
      "contenedor"
    ];

    for (const key of directKeys) {
      if (obj[key] && isContainerCode(obj[key])) {
        return normalizeContainerCode(obj[key]);
      }
    }

    const raw = JSON.stringify(obj);
    const matches = raw.match(/\b[A-Z]{4}\s?\d{6}\s?\d\b/g);

    if (matches && matches.length) {
      return normalizeContainerCode(matches[0]);
    }

    return "";
  }

  function findContainerCodeInPage() {
    const text = document.body ? document.body.innerText : "";
    const matches = text.match(/\b[A-Z]{4}\s?\d{6}\s?\d\b/g);

    if (!matches || !matches.length) return "";

    const clean = matches
      .map(normalizeContainerCode)
      .filter(x => isContainerCode(x))
      .filter(x => !["MSKU1234567", "CICU9876547"].includes(x));

    return clean[0] || "";
  }

  function injectManualEditor() {
    if (document.getElementById("cyraContainerManualBox")) return;

    const box = document.createElement("div");
    box.id = "cyraContainerManualBox";
    box.className = "cyra-container-editor";

    box.innerHTML = `
      <div class="cyra-container-editor-title">Contenedor</div>
      <div class="cyra-container-editor-row">
        <input id="cyraContainerManualInput" placeholder="Ej. MSKU1234567" maxlength="11">
        <button id="cyraContainerManualBtn" type="button">APLICAR</button>
      </div>
      <div class="cyra-container-editor-help">
        Si CYRA AI no logra leer el código desde la foto, ingrésalo manualmente para actualizar el EIR.
      </div>
    `;

    const side = document.querySelector(".side");
    const main = document.querySelector(".main");

    if (side) {
      const ref = side.querySelector(".spt") || side.firstChild;
      if (ref && ref.nextSibling) {
        side.insertBefore(box, ref.nextSibling);
      } else {
        side.appendChild(box);
      }
    } else if (main) {
      main.prepend(box);
    } else {
      document.body.prepend(box);
    }

    const input = box.querySelector("#cyraContainerManualInput");
    const btn = box.querySelector("#cyraContainerManualBtn");

    const current = getCurrentContainerCode();
    if (current) {
      input.value = current;
    }

    btn.addEventListener("click", () => {
      const val = normalizeContainerCode(input.value);

      if (!isContainerCode(val)) {
        alert("Ingresa un código ISO válido de 11 caracteres. Ejemplo: MSKU1234567");
        return;
      }

      setContainerCode(val, true);
    });

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        btn.click();
      }
    });
  }

  function patchFetchForContainer() {
    if (window.__cyraFetchContainerPatch) return;
    if (typeof window.fetch !== "function") return;

    window.__cyraFetchContainerPatch = true;
    const originalFetch = window.fetch;

    window.fetch = async function () {
      const response = await originalFetch.apply(this, arguments);

      try {
        const clone = response.clone();
        const data = await clone.json();
        const code = findContainerCodeInObject(data);

        if (code) {
          setContainerCode(code, false);
        }
      } catch (e) {}

      return response;
    };
  }

  function refreshContainerCode() {
    const current = getCurrentContainerCode();

    if (current) {
      updateContainerText(current);
      return;
    }

    const detected = findContainerCodeInPage();

    if (detected) {
      setContainerCode(detected, false);
    }
  }

  function run() {
    cleanVisibleText();
    injectManualEditor();
    patchFetchForContainer();
    refreshContainerCode();
  }

  document.addEventListener("DOMContentLoaded", () => {
    run();
    setTimeout(run, 500);
    setTimeout(run, 1500);
    setTimeout(run, 3000);
  });

  document.addEventListener("click", () => {
    setTimeout(run, 300);
    setTimeout(run, 1000);
  });

  const obs = new MutationObserver(() => {
    run();
  });

  obs.observe(document.documentElement, {
    childList: true,
    subtree: true,
    characterData: true
  });

  window.cyraSetContainerCode = setContainerCode;
  window.cyraCleanVisibleText = cleanVisibleText;
})();


/* === CYRA HEADER CONTAINER INPUT PATCH === */
(function(){
  const STORAGE_KEY = "cyra_container_code_manual";

  function normalize(code){
    return String(code || "")
      .toUpperCase()
      .replace(/[^A-Z0-9]/g, "")
      .trim();
  }

  function isValidContainer(code){
    return /^[A-Z]{4}\d{7}$/.test(normalize(code));
  }

  function getStoredContainer(){
    return normalize(localStorage.getItem(STORAGE_KEY) || "");
  }

  function replaceContainerText(code){
    if(!code) return;

    if(window.ST){
      ST.containerId = code;
      ST.container = code;
      ST.cid = code;
      ST.container_id_detected = code;
    }

    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let n;

    while((n = walker.nextNode())){
      const txt = normalize(n.nodeValue);

      if(
        txt === "PENDIENTE" ||
        txt === "CONTENEDORVISIBLE" ||
        txt === "CONTENEDOR_VISIBLE" ||
        txt === "MSKU1234567" ||
        txt === "CICU9876547"
      ){
        nodes.push(n);
      }
    }

    nodes.forEach(n => {
      n.nodeValue = code;
    });

    const input = document.getElementById("cyraHeaderContainerInput");
    if(input && input.value !== code){
      input.value = code;
    }
  }

  function setContainer(code){
    const clean = normalize(code);

    if(!isValidContainer(clean)){
      alert("Ingresa un código válido de 11 caracteres. Ejemplo: MSKU0841501");
      return;
    }

    localStorage.setItem(STORAGE_KEY, clean);
    replaceContainerText(clean);
  }

  function findContainerInText(text){
    const matches = String(text || "").match(/\b[A-Z]{4}\s?\d{6}\s?\d\b/g);
    if(!matches || !matches.length) return "";

    const cleaned = matches
      .map(normalize)
      .filter(isValidContainer)
      .filter(x => !["MSKU1234567", "CICU9876547"].includes(x));

    return cleaned[0] || "";
  }

  function findContainerInObject(obj){
    if(!obj) return "";

    try{
      const raw = JSON.stringify(obj);
      return findContainerInText(raw);
    }catch(e){
      return "";
    }
  }

  function injectHeaderInput(){

    const header = document.querySelector(".ah") || document.querySelector("header") || document.body;

    const stored = getStoredContainer();
    if(stored){
      input.value = stored;
      replaceContainerText(stored);

    input.addEventListener("keydown", function(e){

      }
    });

  function patchFetch(){
    if(window.__cyraContainerFetchPatch) return;
    if(typeof window.fetch !== "function") return;

    window.__cyraContainerFetchPatch = true;

    const originalFetch = window.fetch;

    window.fetch = async function(){
      const response = await originalFetch.apply(this, arguments);

      try{
        const clone = response.clone();
        const data = await clone.json();

        const direct =
          normalize(data.container_id_detected) ||
          normalize(data.container_id) ||
          normalize(data.contenedor) ||
          findContainerInObject(data);

        if(isValidContainer(direct)){
          localStorage.setItem(STORAGE_KEY, direct);
          replaceContainerText(direct);
        }
      }catch(e){}

      return response;
    };
  }

  function scanVisible(){
    const stored = getStoredContainer();

    if(stored && isValidContainer(stored)){
      replaceContainerText(stored);
      return;
    }

    const code = findContainerInText(document.body ? document.body.innerText : "");
    if(code){
      localStorage.setItem(STORAGE_KEY, code);
      replaceContainerText(code);
    }
  }

  function run(){
    injectHeaderInput();
    patchFetch();
    scanVisible();
  }

  document.addEventListener("DOMContentLoaded", function(){
    run();
    setTimeout(run, 500);
    setTimeout(run, 1500);
    setTimeout(run, 3000);
  });

  document.addEventListener("click", function(){
    setTimeout(run, 300);
    setTimeout(run, 1000);

    run();
  });

  obs.observe(document.documentElement, {
    childList: true,
    subtree: true,
    characterData: true
  });

  window.cyraSetContainerManual = setContainer;
})();

    }

    localStorage.setItem(STORAGE_KEY, clean);

    if(window.ST){
      ST.containerId = clean;
      ST.container = clean;
      ST.cid = clean;
      ST.container_id_detected = clean;
      ST.idContenedor = clean;
    }

    // Reemplaza textos visibles típicos
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let n;

    while((n = walker.nextNode())){
      const raw = String(n.nodeValue || "");
      const txt = raw.trim();
      const normalized = normalizeContainer(txt);

      if(
        txt === "PENDIENTE" ||
        txt === "CONTENEDOR_VISIBLE" ||
        txt === "MSKU1234567" ||
        txt === "CICU9876547" ||
        /^[A-Z]{4}[0-9]{7}$/.test(normalized)
      ){
        nodes.push(n);
      }
    }

    nodes.forEach(n => {
      n.nodeValue = n.nodeValue.replace(n.nodeValue.trim(), clean);
    });

    // Actualiza inputs
    document.querySelectorAll("input").forEach(input => {
      const ph = String(input.placeholder || "").toUpperCase();
      const id = String(input.id || "").toUpperCase();
      if(ph.includes("CONTENEDOR") || id.includes("CONTAINER") || id.includes("CONTENEDOR")){
        input.value = clean;
      }
    });

    // Actualiza posibles badges/cabeceras que contienen PENDIENTE
    document.querySelectorAll("*").forEach(el => {
      if(el.children.length) return;

      const txt = String(el.textContent || "").trim();
      const normalized = normalizeContainer(txt);

      if(
        txt === "PENDIENTE" ||
        txt === "CONTENEDOR_VISIBLE" ||
        txt === "MSKU1234567" ||
        txt === "CICU9876547" ||
        /^[A-Z]{4}[0-9]{7}$/.test(normalized)
      ){
        el.textContent = clean;
      }
    });

    console.log("CYRA contenedor aplicado:", clean);
    return true;
  }

  function findInputNearButton(btn){
    const box = btn.closest("div, section, header, .ah, .side, .main") || document;
    const inputs = Array.from(box.querySelectorAll("input"));

    let candidate = inputs.find(i => {
      const ph = String(i.placeholder || "").toUpperCase();
      const id = String(i.id || "").toUpperCase();
      return ph.includes("CONTENEDOR") || id.includes("CONTAINER") || id.includes("CONTENEDOR");
    });

    if(candidate) return candidate;

    return document.querySelector("#cyraHeaderContainerInput") ||
           document.querySelector("#cyraContainerManualInput") ||
           document.querySelector("input[placeholder*='CONTENEDOR']") ||
           document.querySelector("input[placeholder*='contenedor']");
  }

  function ensureContainerInput(){
    if(document.getElementById("cyraForceContainerBox")) return;

    const header = document.querySelector(".ah") || document.body;

    const box = document.createElement("div");
    box.id = "cyraForceContainerBox";
    box.style.cssText = "display:flex;gap:6px;align-items:center;margin-left:8px;padding:4px 7px;border:1px solid rgba(0,210,120,.25);border-radius:8px;background:rgba(0,210,120,.06);";

    box.innerHTML = `
      <input id="cyraForceContainerInput" placeholder="CONTENEDOR" maxlength="11" style="width:125px;background:#06121c;border:1px solid rgba(0,210,120,.35);color:#dfffee;border-radius:6px;padding:6px 8px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;outline:none;">
      <button id="cyraForceContainerBtn" type="button" style="background:#00d278;color:#02150f;border:0;border-radius:6px;padding:7px 9px;font-size:9px;font-weight:900;cursor:pointer;">APLICAR</button>
    `;

    header.appendChild(box);

    const stored = normalizeContainer(localStorage.getItem(STORAGE_KEY) || "");
    if(stored && isContainer(stored)){
      box.querySelector("input").value = stored;
      setTimeout(() => applyContainerEverywhere(stored), 300);
    }
  }

  // Evento global: captura cualquier botón APLICAR de contenedor
  document.addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    const label = String(btn.textContent || "").trim().toUpperCase();

    if(label === "APLICAR" || btn.id === "cyraForceContainerBtn" || btn.id === "cyraHeaderContainerBtn" || btn.id === "cyraContainerManualBtn"){
      const input = findInputNearButton(btn) || document.getElementById("cyraForceContainerInput");

      if(input){
        e.preventDefault();
        e.stopPropagation();
        applyContainerEverywhere(input.value);
      }
    }
  }, true);

  document.addEventListener("keydown", function(e){
    if(e.key !== "Enter") return;

    const input = e.target.closest("input");
    if(!input) return;

    const ph = String(input.placeholder || "").toUpperCase();
    const id = String(input.id || "").toUpperCase();

    if(ph.includes("CONTENEDOR") || id.includes("CONTAINER") || id.includes("CONTENEDOR")){
      e.preventDefault();
      applyContainerEverywhere(input.value);
    }
  }, true);

  function run(){
    ensureContainerInput();

    const stored = normalizeContainer(localStorage.getItem(STORAGE_KEY) || "");
    if(stored && isContainer(stored)){
      applyContainerEverywhere(stored);
    }
  }

  document.addEventListener("DOMContentLoaded", function(){
    run();
    setTimeout(run, 600);
    setTimeout(run, 1800);
  });

  document.addEventListener("click", function(){
    setTimeout(run, 400);
  });

  window.cyraApplyContainerEverywhere = applyContainerEverywhere;
})();

/* === CYRA USE CONTAINER_ID_DETECTED PATCH === */
(function(){
  const STORAGE_KEY = "cyra_container_code_manual";

  function normalize(code){
    return String(code || "")
      .toUpperCase()
      .replace(/[^A-Z0-9]/g, "")
      .trim();
  }

  function isValid(code){
    return /^[A-Z]{4}\d{7}$/.test(normalize(code));
  }

  function deepFindContainer(obj){
    if(!obj) return "";

    const directKeys = [
      "container_id_detected",
      "container_id",
      "container",
      "container_code",
      "id_contenedor",
      "contenedor"
    ];

    for(const key of directKeys){
      if(obj[key] && isValid(obj[key])){
        return normalize(obj[key]);
      }
    }

    try{
      const raw = JSON.stringify(obj).toUpperCase();
      const match = raw.match(/\b[A-Z]{4}\s?\d{6}\s?\d\b/);
      if(match && match[0]){
        const clean = normalize(match[0]);
        if(isValid(clean)) return clean;
      }
    }catch(e){}

    return "";
  }

  function replacePendingEverywhere(code){
    const clean = normalize(code);
    if(!isValid(clean)) return;

    localStorage.setItem(STORAGE_KEY, clean);

    if(window.ST){
      ST.containerId = clean;
      ST.container = clean;
      ST.cid = clean;
      ST.container_id_detected = clean;
      ST.idContenedor = clean;
    }

    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let n;

    while((n = walker.nextNode())){
      const txt = String(n.nodeValue || "").trim();
      const normalized = normalize(txt);

      if(
        txt === "PENDIENTE" ||
        txt === "CONTENEDOR_VISIBLE" ||
        txt === "MSKU1234567" ||
        txt === "CICU9876547" ||
        /^[A-Z]{4}\d{7}$/.test(normalized)
      ){
        nodes.push(n);
      }
    }

    nodes.forEach(n => {
      n.nodeValue = clean;
    });

    document.querySelectorAll("input").forEach(input => {
      const ph = String(input.placeholder || "").toUpperCase();
      const id = String(input.id || "").toUpperCase();
      if(ph.includes("CONTENEDOR") || id.includes("CONTAINER") || id.includes("CONTENEDOR")){
        input.value = clean;
      }
    });

    console.log("CYRA container_id_detected aplicado en HTML:", clean);
  }

  function patchFetch(){
    if(window.__cyraUseContainerDetectedFetchPatch) return;
    if(typeof window.fetch !== "function") return;

    window.__cyraUseContainerDetectedFetchPatch = true;
    const originalFetch = window.fetch;

    window.fetch = async function(){
      const response = await originalFetch.apply(this, arguments);

      try{
        const clone = response.clone();
        const data = await clone.json();

        const code = deepFindContainer(data);

        if(code){
          replacePendingEverywhere(code);
        }
      }catch(e){}

      return response;
    };
  }

  function patchRender(){
    if(window.__cyraUseContainerDetectedRenderPatch) return;
    if(typeof window.renderView !== "function") return;

    window.__cyraUseContainerDetectedRenderPatch = true;
    const originalRenderView = window.renderView;

    window.renderView = function(){
      const result = originalRenderView.apply(this, arguments);

      setTimeout(() => {
        const stored = normalize(localStorage.getItem(STORAGE_KEY) || "");
        if(isValid(stored)){
          replacePendingEverywhere(stored);
        }
      }, 150);

      return result;
    };
  }

  function applyStored(){
    const stored = normalize(localStorage.getItem(STORAGE_KEY) || "");
    if(isValid(stored)){
      replacePendingEverywhere(stored);
    }
  }

  function run(){
    patchFetch();
    patchRender();
    applyStored();
  }

  document.addEventListener("DOMContentLoaded", function(){
    run();
    setTimeout(run, 500);
    setTimeout(run, 1500);
    setTimeout(run, 3000);
  });

  document.addEventListener("click", function(){
    setTimeout(run, 300);
    setTimeout(run, 1000);
  });

  const obs = new MutationObserver(function(){
    applyStored();
  });

  obs.observe(document.documentElement, {
    childList: true,
    subtree: true,
    characterData: true
  });

  window.cyraApplyDetectedContainer = replacePendingEverywhere;
})();

(function(){
  function isLoginScreenActive(){
    const bodyText = document.body ? document.body.innerText.toLowerCase() : "";
    const hasLogin = bodyText.includes("iniciar") || bodyText.includes("login") || bodyText.includes("usuario") || bodyText.includes("contraseña");
    const hasInspection = bodyText.includes("inspección id") || bodyText.includes("eir final") || bodyText.includes("procesar inspección");
    return hasLogin && !hasInspection;
  }

  function clearContainerOnlyOnLogin(){
    if(isLoginScreenActive()){
      localStorage.removeItem("cyra_container_code_manual");
    }
  }

  document.addEventListener("DOMContentLoaded", function(){
    clearContainerOnlyOnLogin();
    setTimeout(clearContainerOnlyOnLogin, 500);
    setTimeout(clearContainerOnlyOnLogin, 1500);
  });
})();
